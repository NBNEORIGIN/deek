# config/brief/user_profiles.yaml
#
# Memory Brief Tier 2 — per-recipient profile. Adds role-scoped
# framing to the daily brief without changing the underlying
# question generators.
#
# Tier 1 (you): full range of categories, Deek-wide scope.
# Tier 2 (Jo, Ivan): same question mechanics, role-specific
# open-ended prompt + welcome line.
# Tier 3 (Gabby, Sanna, Ben): not yet — added here as commented
# placeholders so the config shape is discoverable.
#
# Schema:
#   users:
#     <email>:
#       role:            director | operations | crm_ops | ...
#       display_name:    first-name for the welcome line
#       open_ended_prompt:
#                        overrides the default "one thing from
#                        yesterday worth remembering long-term"
#                        with something role-appropriate
#       active:          bool (if false, no brief is sent)
#
# Missing users fall back to the director/Toby defaults.

version: 1

users:

  toby@nbnesigns.com:
    role: director
    display_name: Toby
    # open_ended_prompt unset → uses the default from templates.yaml
    active: true
    # Delivery channel: 'email' (default) or 'telegram'. Telegram
    # requires the user to be in cairn_intel.registered_telegram_chats
    # (pair via scripts/telegram_join_code.py).
    channel: telegram

  jo@nbnesigns.com:
    role: operations_hr_finance
    display_name: Jo
    active: true
    # Jo's brief is built around her actual remit: HR, finance,
    # D2C. The DB-backed categories (belief_audit / gist_validation
    # / salience_calibration) don't apply to her domain — her
    # question_categories list overrides the default tier-1 mix.
    question_categories:
      - hr_pulse
      - finance_check
      - d2c_observation
      - open_ended
    open_ended_prompt: |
      One thing from the office or shop floor yesterday worth
      remembering long-term — a process change, a near-miss, a
      customer or supplier moment, an idea worth trying.

      Reply: (free text — one or two sentences)

  ivan@nbnesigns.com:
    role: production_tech
    display_name: Ivan
    active: true
    # Ivan's brief is built around production + technical work:
    # CNC, UV printing, 3D printing, PC builds. Same override
    # pattern as Jo.
    question_categories:
      - production_quality
      - equipment_health
      - technical_solve
      - open_ended
    open_ended_prompt: |
      One thing from yesterday worth remembering long-term — a
      decision made, a system tweak, a problem solved, an idea
      worth trying tomorrow.

      Reply: (free text — one or two sentences)


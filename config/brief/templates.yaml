# config/brief/templates.yaml
#
# Versioned question-framing templates for the Memory Brief. Changes
# here are a PR (per the strategic preamble — configuration that will
# change frequently lives in version control, not in runtime config
# or the DB).
#
# Each template has a fixed reply format so Phase B's parser can
# extract answers deterministically. Don't make the reply format
# free text unless Phase B is ready to handle it.
#
# Available placeholders:
#   {schema_text}        — full schema.schema_text
#   {schema_age_days}    — days since schema.derived_at
#   {source_count}       — len(schema.source_memory_ids)
#   {confidence}         — schema.confidence (0-1)
#   {salience}           — schema.salience (0-10) or memory salience
#   {memory_snippet}     — first ~200 chars of memory chunk_content
#   {memory_date}        — date of memory write
#   {signal_block}       — formatted salience signal breakdown

version: 1

templates:

  belief_audit:
    # Pick an active schema with access_count <= 2 — either it's
    # wrong, or it's correct-but-ignored. Either way, confirmation
    # is cheap and valuable.
    description: >
      Surfaces a low-access active schema for TRUE/FALSE confirmation.
      Worth more than a high-access schema (which Deek has already
      seen working); low-access = never corroborated in practice.
    reply_format: "TRUE / FALSE / [correction]"
    prompt: |
      BELIEF AUDIT — {schema_age_days} days old, used {access_count} times

      I currently believe:
        {schema_text}

      Is this still true?
      Reply: TRUE  /  FALSE  /  [correction]

  gist_validation:
    # Recent consolidation output (7-30 days old), middling confidence
    # 0.7-0.9 — low enough to be worth checking, high enough to have
    # survived the consolidation filter.
    description: >
      A recently-distilled schema. Asks whether the gist matches
      what the human would actually take away from the source
      memories. Prevents the model's consolidation from being indexed
      as authoritative when it's subtly wrong.
    reply_format: "YES / NO / [revised text]"
    prompt: |
      GIST VALIDATION — distilled {schema_age_days} days ago from {source_count} memories (confidence {confidence:.2f})

      I extracted this as a pattern:
        {schema_text}

      Does that match what you'd actually take away?
      Reply: YES  /  NO  /  [revised text]

  salience_calibration:
    # Yesterday's highest-salience memory. Asks whether it's
    # genuinely important long-term or noise that happened to score
    # high on money/pushback/failure signals.
    description: >
      Checks whether yesterday's salience extractor got it right.
      Primarily catches false positives — memories that scored high
      on surface signals but aren't actually worth prioritising.
    reply_format: "YES / NO / [why or why not]"
    prompt: |
      SALIENCE CHECK — flagged yesterday with salience {salience:.1f}/10

      Dated {memory_date}:
        {memory_snippet}

      Signal breakdown: {signal_block}

      Is this genuinely important long-term?
      Reply: YES  /  NO  /  [why or why not]

  open_ended:
    # Always included. No source query — this is the "tell me
    # something I didn't know to ask" slot.
    description: >
      Open prompt for things the generator couldn't have derived
      from memory state. Catches important events that didn't make
      it into a memory write, or nuance that algorithmic selection
      would miss.
    reply_format: "Free text (one or two sentences)"
    prompt: |
      OPEN —

      One thing from yesterday worth remembering long-term.

      Reply: (free text — one or two sentences)

  # ── Role-specific self-prompt categories ──────────────────────
  # These have no DB query — they're domain prompts for tier-2
  # users (Jo: HR/finance/D2C; Ivan: production/equipment/tech).
  # Replies get persisted with role-tagged salience so retrieval
  # can scope by domain.

  hr_pulse:
    description: >
      Daily HR / staff pulse. Catches morale, timekeeping, training
      gaps, conflict, anything Jo notices about the team that
      should be remembered as it accumulates into a pattern.
    reply_format: "Free text or 'nothing'"
    role_tag: "hr"
    prompt: |
      HR / STAFF PULSE —

      Anything from the team yesterday worth flagging? (timekeeping,
      mood, training need, conflict, something said that stuck with
      you, a near-miss). 'nothing' is a valid answer.

      Reply: (free text)

  finance_check:
    description: >
      Daily finance pulse. Cashflow surprises, supplier issues,
      D2C cost movement, anything that affects the books.
    reply_format: "Free text or 'nothing'"
    role_tag: "finance"
    prompt: |
      FINANCE CHECK —

      Anything financial from yesterday worth Deek noting? (a late
      invoice, a supplier price change, a refund, a D2C cost
      surprise, an unexpected payment). 'nothing' is fine.

      Reply: (free text)

  d2c_observation:
    description: >
      D2C-specific observation. Order patterns, customer feedback,
      returns, listing performance, any signal Jo picked up that
      product / market is moving.
    reply_format: "Free text or 'nothing'"
    role_tag: "d2c"
    prompt: |
      D2C OBSERVATION —

      Anything you noticed about D2C yesterday? (an order pattern,
      a customer message, a return reason, a listing change you'd
      flag). 'nothing' is valid.

      Reply: (free text)

  production_quality:
    description: >
      Daily production quality pulse for Ivan. UV print finish,
      CNC tolerance, material defect, repeated rework — anything
      that should accumulate into a quality pattern.
    reply_format: "Free text or 'nothing'"
    role_tag: "production"
    prompt: |
      PRODUCTION QUALITY —

      Anything quality-related from yesterday's runs? (a UV finish
      issue, CNC tolerance drift, sheet warping, repeated rework, a
      recurring fault). 'nothing' if all clean.

      Reply: (free text)

  equipment_health:
    description: >
      Equipment status. Tool wear, head clogs, calibration drift,
      maintenance Ivan did or noticed needs doing. Builds the
      equipment-history record over time.
    reply_format: "Free text or 'nothing'"
    role_tag: "equipment"
    prompt: |
      EQUIPMENT HEALTH —

      Anything yesterday on tool / printer / CNC condition? (a
      jam, a wear note, a calibration done, a part Toby should
      order, a printer behaving oddly). 'nothing' if everything
      ran clean.

      Reply: (free text)

  technical_solve:
    description: >
      Captures Ivan's clever fixes / workarounds / system
      improvements. Specifically aims at the institutional-knowledge
      gap where solutions get found once and forgotten.
    reply_format: "Free text or 'nothing'"
    role_tag: "tech"
    prompt: |
      TECHNICAL SOLVE —

      Any clever fix, workaround, or system improvement from
      yesterday worth Deek remembering for next time? (a tool
      setting that worked, a 3D print profile, a PC config, a CNC
      sequencing trick). 'nothing' is fine.

      Reply: (free text)
